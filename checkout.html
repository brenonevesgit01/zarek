<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Zarek</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <script async defer src="https://js.whop.com/static/checkout/loader.js"></script>
    <style>
      *,*::before,*::after{box-sizing:border-box;}
      html,body{margin:0;padding:0;background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;min-height:100vh;}
      .ck-topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;}
      .ck-brand{font-size:20px;font-weight:700;letter-spacing:6px;text-decoration:none;color:#111;font-family:Georgia,serif;}
      .ck-back{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#666;text-decoration:none;display:flex;align-items:center;gap:6px;}
      .ck-back:hover{color:#111;}
      .ck-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
      .ck-page{display:flex;justify-content:center;padding:48px 24px 80px;}
      .ck-frame{width:100%;max-width:560px;background:#fff;border:1px solid #e5e5e5;padding:24px;min-height:520px;}
      .ck-status{text-align:center;font-size:12px;color:#666;padding:120px 24px;letter-spacing:1px;}
      .ck-spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#111;border-radius:50%;animation:cks .8s linear infinite;vertical-align:middle;margin-right:8px;}
      @keyframes cks{to{transform:rotate(360deg);}}
      .ck-error{background:#fff0f0;border:1px solid #c1121f;color:#c1121f;padding:16px;font-size:12px;margin:24px 0;}
      .ck-empty{text-align:center;color:#666;font-size:13px;padding:80px 24px;}
      .ck-empty a{color:#111;font-weight:700;text-decoration:underline;}
      .ck-secure{text-align:center;font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase;margin-top:24px;}
      .ck-secure svg{width:12px;height:12px;vertical-align:middle;margin-right:4px;}
    </style>
</head>
<body>
    <div class="ck-topbar">
        <a href="index.html" class="ck-brand">ZAREK</a>
        <a href="cart.html" class="ck-back">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Back to cart
        </a>
    </div>

    <div class="ck-page">
        <div class="ck-frame" id="ck-frame">
            <div class="ck-status"><span class="ck-spinner"></span>Preparing secure checkout…</div>
        </div>
    </div>

    <script>
      (function(){
        const cart = JSON.parse(localStorage.getItem('zarek-cart') || '[]');
        const frame = document.getElementById('ck-frame');

        if (!cart.length) {
          frame.innerHTML = '<div class="ck-empty">Your cart is empty.<br><br><a href="collection.html?cat=coats-jackets">Continue shopping</a></div>';
          return;
        }

        function showError(msg) {
          frame.innerHTML = `<div class="ck-error">${msg}</div>`;
        }

        function mountWidget(planId, sessionId) {
          frame.innerHTML = '';
          const widget = document.createElement('div');
          widget.setAttribute('data-whop-checkout-plan-id', planId);
          widget.setAttribute('data-whop-checkout-session', sessionId);
          widget.setAttribute('data-whop-checkout-return-url', window.location.origin + '/sucesso.html');
          widget.setAttribute('data-whop-checkout-theme', 'light');
          widget.style.minHeight = '520px';
          frame.appendChild(widget);

          const secure = document.createElement('div');
          secure.className = 'ck-secure';
          secure.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="1"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>Secure checkout protected by Whop';
          frame.appendChild(secure);
        }

        (async function initPayment() {
          try {
            const resp = await fetch('/api/create-checkout', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                items: cart.map(i => ({
                  id: i.id,
                  name: i.name,
                  sku: i.id,
                  color: i.color,
                  size: i.size,
                  qty: Number(i.qty || 1),
                  price: Number(i.price)
                })),
                return_url: window.location.origin + '/sucesso.html'
              })
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Checkout request failed');
            if (!data.plan_id || !data.session_id) throw new Error('Missing plan or session id');

            mountWidget(data.plan_id, data.session_id);

            // Force re-scan: re-append loader so the Whop main script attaches the widget
            const reloader = document.createElement('script');
            reloader.src = 'https://js.whop.com/static/checkout/loader.js?v=' + Date.now();
            reloader.async = true;
            document.head.appendChild(reloader);

            // Fallback: if widget hasn't been replaced by an iframe within 4s,
            // redirect to the hosted Whop checkout instead so the customer
            // always reaches a payment screen.
            setTimeout(function() {
              const iframe = frame.querySelector('iframe');
              if (!iframe) {
                window.location.href = data.checkout_url;
              }
            }, 4000);
          } catch (err) {
            console.error(err);
            showError('Could not start checkout: ' + err.message + '. Please refresh the page to try again.');
          }
        })();
      })();
    </script>
</body>
</html>
